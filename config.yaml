df_id: df-e2-visa-tracker
df_name: E2-Visa-Tracker
welle_introduced: welle-43
type: foundation-df
crux-mk: true

default_action:
  description: "E-2 Visa Tracker - Investment-Threshold-Monitoring ($100k+) + USCIS-Filing-Status + Source-of-Funds-Dokumentation + Familien-Begleitung Dependent-Visa-Status (Empfehlungs-only, KEINE Filing-Aktion)"
  rho_per_run_eur: 80
  rho_validation_source: unvalidated
  block_gates:
    - gate_id: K13_PAV
      block_reason: "Pre-Action-Verification PFLICHT bei K_0+Q_0-Direct: KEIN-Direct-USCIS-Filing (Anwaltsvorbehalt §StBerG/RDG) + Steuer-Implikation Source-of-Funds + Brueder-Kohaesion-Q_0-Risk"
      false_block_cost_eur: 60
      legitimate_block_condition: "Direct-USCIS-Filing-Attempt (immer REJECT, Anwaltsvorbehalt) ODER Production-Mode ohne PHRONESIS_TICKET"
    - gate_id: K14
      block_reason: "Human-Override-Decay: USCIS-Status-Changes immer Martin-Review (no auto-decision)"
      false_block_cost_eur: 40
      legitimate_block_condition: "Auto-Decision-Mode ohne Martin-Review-Loop"
  graceful_degradation_path: "Sandbox-Tracking-only-Mode (Status-Display + Threshold-Alerts ohne API-Calls zu USCIS)"

k0_touch: true
q0_touch: true
k0_caveats:
  - "Investment-Threshold $100k+ Direct-K_0-Berührung"
  - "Anwaltskosten + USCIS-Filing-Fees"
  - "Source-of-Funds-Dokumentation Steuer-Implikation"
q0_caveats:
  - "Familien-Lebensmittelpunkt-Wechsel"
  - "Familien-Begleitung E-2 Dependent-Visa"
  - "Brueder-Kohaesion-Risk"
phronesis_required: true
sandbox_default: true

cascade_isolation: hard
failure_blast_radius: 1
output_feeds_into_training: false
external_anchor_type: government_data
external_anchor_validation_frequency: weekly
concurrent_spawn_protection: both
lock_dir: /tmp/df-e2-visa-tracker.lock
lock_stale_age_h: 6

lose_coupling:
  LC1_graceful_degradation:
    degradation_modes: [full, degraded_no_external, sandbox_mock]
    degradation_test_required: true
  LC2_direct_mode:
    direct_mode_available: true
    direct_mode_capability: 0.6
    direct_mode_trigger: "external API unreachable >30s"
  LC3_circuit_breaker:
    circuit_breaker_timeout_s: 30
    circuit_breaker_open_threshold: 3
    circuit_breaker_half_open_test_interval_s: 300
  LC4_failure_isolation:
    state_externalization: true
    idempotent_operations: true
    dependency_dlq_separate: true
  LC5_health_check:
    health_check_dependencies: []
    health_check_degraded_score: 0.7
    health_check_endpoint_or_file: "branch-hub/state/df-e2-visa-tracker-health.json"

env_vars:
  DF_E2_VISA_REAL_ENABLED: "false"
  PHRONESIS_TICKET: "MISSING"

schedule:
  cadence: daily
  time: "04:00"
  timezone: Europe/Berlin
